name: Build Sanatani Bandhan APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # UPDATED to v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # UPDATED to v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Installable APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Professional Distribution
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Sanatani-Bandhan-v1.0.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # UPDATED to v4
      with:
        name: Sanatani-Bandhan-Release
        path: app/build/outputs/apk/debug/Sanatani-Bandhan-v1.0.apk
